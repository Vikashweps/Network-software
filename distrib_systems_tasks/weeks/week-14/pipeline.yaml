name: CI/CD Pipeline for sessions-s16

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  IMAGE_NAME: sessions-s16
  REGISTRY: docker.io/vikapavlova
  PYTHON_VERSION: "3.11"

jobs:
  #  Lint
  lint:
    name: Lint with flake8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'  # Кэширование pip
      - name: Install deps & lint
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check app/

  #  Test
  test:
    name: Run pytest
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'  #  Кэширование pip
      - name: Install deps & run tests
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt pytest httpx
          pytest app/ -v

  #  Build & Publish
  build-and-publish:
    name: Build & Publish Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build . -f Dockerfile \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Push to Registry
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      #  Сохраняем образ как tar-архив
      - name: Save Docker artifact
        run: |
          docker save ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest > sessions-s16.tar

      #  Загружаем артефакт 
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sessions-s16-docker-image
          path: sessions-s16.tar
          retention-days: 7