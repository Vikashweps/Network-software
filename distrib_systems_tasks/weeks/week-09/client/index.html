<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC P2P Chat — reviews-s16</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; background: #f5f5f5; }
        .container { background: #fff; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        #log { height: 250px; overflow-y: auto; border: 1px solid #ddd; padding: 0.5rem; margin: 1rem 0; background: #fafafa; border-radius: 4px; }
        .msg { margin: 0.4rem 0; word-break: break-word; }
        .me { color: #2563eb; }
        .peer { color: #059669; }
        .sys { color: #6b7280; font-style: italic; font-size: 0.9rem; }
        input, button { padding: 0.5rem; margin: 0.2rem; border: 1px solid #ccc; border-radius: 4px; }
        button { cursor: pointer; background: #2563eb; color: #fff; border: none; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        .status { padding: 0.5rem; margin-bottom: 1rem; background: #e0f2fe; border-radius: 4px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🌐 P2P Чат (WebRTC) — reviews-s16</h2>
        <div id="setup">
            <input id="my-id" placeholder="Ваш ID" value="user1">
            <input id="target-id" placeholder="ID собеседника" value="user2">
            <button onclick="startAsOffer()">🟢 Создать комнату</button>
            <button onclick="startAsAnswer()">🔵 Присоединиться</button>
        </div>
        <div id="status" class="status">Ожидание подключения...</div>
        <div id="log"></div>
        <div>
            <input id="msg-input" placeholder="Введите сообщение..." disabled style="width: 70%;">
            <button id="send-btn" onclick="sendMessage()" disabled>Отправить</button>
        </div>
    </div>

    <script>
        const SIGNALING_WS = "ws://localhost:8765";
        const STUN = { urls: "stun:stun.l.google.com:19302" };
        let ws, pc, dc, myId, targetId;
        let iceQueue = []; // Очередь для ICE-кандидатов

        function log(text, type = "sys") {
            const div = document.createElement("div");
            div.className = `msg ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            const el = document.getElementById("log");
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
            console.log(`[WebRTC] ${type}: ${text}`);
        }

        async function waitForWsOpen() {
            if (ws && ws.readyState === WebSocket.OPEN) return true;
            return new Promise(resolve => {
                if (!ws) { resolve(false); return; }
                const check = () => {
                    if (ws.readyState === WebSocket.OPEN) resolve(true);
                    else if (ws.readyState === WebSocket.CLOSED) resolve(false);
                    else setTimeout(check, 50);
                };
                check();
            });
        }

        async function connectSignaling() {
            myId = document.getElementById("my-id").value.trim() || "user1";
            targetId = document.getElementById("target-id").value.trim() || "user2";
            iceQueue = []; // сброс очереди при новом подключении

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "join", id: myId }));
                return;
            }

            ws = new WebSocket(SIGNALING_WS);
            ws.onopen = () => {
                ws.send(JSON.stringify({ type: "join", id: myId }));
                log(`Подключено к сигналингу как ${myId}`);
            };
            ws.onmessage = async (e) => {
                const data = JSON.parse(e.data);
                if (data.type === "chat") return log(`Собеседник: ${data.data}`, "peer");
                
                if (data.type === "offer") {
                    iceQueue = [];
                    await handleOffer(data);
                    await flushIceQueue();
                    return;
                }
                if (data.type === "answer") {
                    iceQueue = [];
                    await handleAnswer(data);
                    await flushIceQueue();
                    return;
                }
                if (data.type === "candidate") {
                    if (!pc || !pc.remoteDescription) {
                        iceQueue.push(data.candidate);
                        console.log("📦 Candidate queued");
                        return;
                    }
                    try {
                        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                    } catch (err) {
                        console.warn("⚠️ Не добавлен candidate:", err);
                    }
                }
            };
            ws.onclose = () => log("Соединение с сигналингом закрыто");
            ws.onerror = (err) => console.error("WebSocket error:", err);
        }

        async function flushIceQueue() {
            for (const candidate of iceQueue) {
                try {
                    if (pc && pc.remoteDescription) {
                        await pc.addIceCandidate(new RTCIceCandidate(candidate));
                    }
                } catch (err) {
                    console.warn("⚠️ Не добавлен candidate из очереди:", err);
                }
            }
            iceQueue = [];
        }

        function createPeerConnection() {
            if (pc) {
                pc.onicecandidate = null;
                pc.onconnectionstatechange = null;
                pc.ondatachannel = null;
                if (pc.connectionState !== "closed") pc.close();
            }
            
            pc = new RTCPeerConnection({ iceServers: [STUN] });
            
            pc.onicecandidate = (e) => {
                if (!e.candidate) return;
                if (!ws || ws.readyState !== WebSocket.OPEN) return;
                if (!pc || !pc.remoteDescription) {
                    iceQueue.push(e.candidate);
                    return;
                }
                try {
                    ws.send(JSON.stringify({ 
                        type: "candidate", 
                        target: targetId, 
                        candidate: e.candidate 
                    }));
                } catch (err) {
                    console.warn("⚠️ Не отправлен candidate:", err);
                }
            };
            
            pc.onconnectionstatechange = () => {
                if (!pc) return;
                log(`Статус WebRTC: ${pc.connectionState}`);
                if (pc.connectionState === "connected") {
                    document.getElementById("setup").style.display = "none";
                    document.getElementById("msg-input").disabled = false;
                    document.getElementById("send-btn").disabled = false;
                    document.getElementById("status").textContent = "✅ P2P соединение установлено!";
                }
            };
        }

        async function startAsOffer() {
            if (pc && pc.connectionState !== "closed" && pc.connectionState !== "new") {
                log("⚠️ Соединение уже создаётся, подождите...");
                return;
            }
            
            myId = document.getElementById("my-id").value.trim() || "user1";
            targetId = document.getElementById("target-id").value.trim() || "user2";
            
            await connectSignaling();
            const wsReady = await waitForWsOpen();
            if (!wsReady) {
                log("❌ Не удалось подключиться к сигналингу");
                return;
            }
            
            createPeerConnection();
            dc = pc.createDataChannel("chat");
            setupDataChannel();
            
            try {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                
                ws.send(JSON.stringify({ 
                    type: "offer", 
                    target: targetId, 
                    sdp: pc.localDescription 
                }));
                log("✅ Отправлен Offer. Ждём Answer...");
            } catch (e) {
                console.error("❌ Ошибка offer:", e);
                log("Ошибка: " + e.message);
                if (pc) pc.close();
            }
        }

        async function startAsAnswer() {
            if (pc && pc.connectionState !== "closed" && pc.connectionState !== "new") {
                log("⚠️ Соединение уже создаётся, подождите...");
                return;
            }
            
            myId = document.getElementById("my-id").value.trim() || "user1";
            targetId = document.getElementById("target-id").value.trim() || "user2";
            
            await connectSignaling();
            const wsReady = await waitForWsOpen();
            if (!wsReady) {
                log("❌ Не удалось подключиться к сигналингу");
                return;
            }
            
            createPeerConnection();
            pc.ondatachannel = (e) => { dc = e.channel; setupDataChannel(); };
            log("✅ Готов принять Offer от собеседника...");
        }

        async function handleOffer(msg) {
            try {
                if (pc && pc.signalingState !== "stable" && pc.signalingState !== "have-local-offer") {
                    console.warn("⚠️ Пропущен offer, signalingState:", pc.signalingState);
                    return;
                }
                
                await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
                const ans = await pc.createAnswer();
                await pc.setLocalDescription(ans);
                
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ 
                        type: "answer", 
                        target: targetId,
                        sdp: pc.localDescription
                    }));
                    log("✅ Отправлен Answer");
                }
            } catch (e) {
                console.error("❌ Ошибка answer:", e);
                log("Ошибка: " + e.message);
            }
        }

        async function handleAnswer(msg) {
            try {
                await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
                log("✅ Remote description установлен, соединение...");
            } catch (e) {
                console.error("❌ Ошибка setRemoteDescription:", e);
                log("Ошибка: " + e.message);
            }
        }

        function setupDataChannel() {
            if (!dc) return;
            dc.onopen = () => log("Data Channel открыт! Можете писать.", "sys");
            dc.onmessage = (e) => log(`Получено: ${e.data}`, "peer");
            dc.onclose = () => log("Data Channel закрыт");
            dc.onerror = (err) => console.error("DataChannel error:", err);
        }

        function sendMessage() {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (text && dc && dc.readyState === "open") {
                dc.send(text);
                log(`Вы: ${text}`, "me");
                input.value = "";
            }
        }

        // Очистка при закрытии вкладки
        window.addEventListener("beforeunload", () => {
            if (dc && dc.readyState === "open") dc.close();
            if (pc && pc.connectionState !== "closed") pc.close();
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "leave", id: myId }));
                ws.close();
            }
        });

        document.getElementById("msg-input").addEventListener("keypress", e => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
