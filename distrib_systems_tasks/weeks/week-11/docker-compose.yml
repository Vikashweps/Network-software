# Строку version: '3.8' удалили — она больше не нужна

services:
  # 🔹 Твой сервис (пиццерия/сессии)
  sessions-svc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sessions-svc-s16
    ports:
      - "8107:8107"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    # ✅ ИСПРАВЛЕНО: используем python вместо curl (в slim нет curl!)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8107/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # 🔹 Redis
  redis:
    image: redis:7-alpine
    container_name: redis-s16
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # 🔹 Nginx Gateway
  gateway:
    image: nginx:alpine
    container_name: gateway-s16
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      sessions-svc:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  redis-data: